<!doctype html>
<html data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self';">
  <title>AniSmooth</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/toolsSetup.css">
  <script src="./js/utils/tabLoader.js"></script>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <span class="topbar-brand"><img id="brandLogo" src="./images/AniSmooth-Logo.png" alt="AniSmooth" style="height: 20px; width: auto; object-fit: contain;"></span>
      <nav class="topbar-nav">
        <button id="deadframesTabBtn" class="nav-icon active" title="Deadframes">
          <i class="fa-solid fa-scissors"></i>
        </button>
        <button id="interpolationTabBtn" class="nav-icon" title="Interpolation">
          <i class="fa-solid fa-forward"></i>
        </button>
        <button id="upscaleTabBtn" class="nav-icon" title="Upscale">
          <i class="fa-solid fa-expand"></i>
        </button>
        <button id="consoleTabBtn" class="nav-icon" title="Console">
          <i class="fa-solid fa-terminal"></i>
        </button>
        <button id="queueTabBtn" class="nav-icon" title="Queue">
          <i class="fa-solid fa-list-check"></i>
        </button>
        <button id="stopwatchTabBtn" class="nav-icon" title="Stopwatch">
          <i class="fa-solid fa-stopwatch"></i>
        </button>
        <button id="sysmonTabBtn" class="nav-icon" title="System Monitor">
          <i class="fa-solid fa-chart-line"></i>
        </button>
        <button id="settingsTabBtn" class="nav-icon" title="Settings">
          <i class="fa-solid fa-gear"></i>
        </button>
      </nav>
    </header>

    <main class="content">
      <div data-tab="deadframes"></div>
      <div data-tab="interpolation"></div>
      <div data-tab="upscale"></div>
      <div data-tab="console"></div>
      <div data-tab="queue"></div>
      <div data-tab="stopwatch"></div>
      <div data-tab="sysmon"></div>
      <div data-tab="settings"></div>
    </main>
  </div>

  <div id="tools-setup-gate" class="setup-gate" style="display:none;"></div>

  
  <div id="confirmModal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <div class="modal-icon"><i class="fa-solid fa-circle-question"></i></div>
      <p class="modal-msg" id="confirmMsg"></p>
      <div class="modal-btns">
        <button class="btn-sm" id="confirmCancel"><i class="fa-solid fa-xmark"></i> Cancel</button>
        <button class="btn" id="confirmOk"><i class="fa-solid fa-check"></i> Confirm</button>
      </div>
    </div>
  </div>

  
  <div id="promptModal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <div class="modal-icon"><i class="fa-solid fa-pen-to-square"></i></div>
      <p class="modal-msg" id="promptTitle"></p>
      <div class="modal-input-wrap">
        <input type="text" id="promptInput" class="modal-input" placeholder="Preset name..." maxlength="40">
        <input type="text" id="promptDesc" class="modal-input modal-input-desc" placeholder="Description (optional)" maxlength="80">
      </div>
      <div class="modal-btns">
        <button class="btn-sm" id="promptCancel"><i class="fa-solid fa-xmark"></i> Cancel</button>
        <button class="btn" id="promptOk"><i class="fa-solid fa-check"></i> Save</button>
      </div>
    </div>
  </div>

  
  <div id="sectionModal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <div class="modal-icon"><i class="fa-solid fa-list-check"></i></div>
      <p class="modal-msg">Choose what to include in this preset</p>
      <div id="sectionToggles" class="section-toggles"></div>
      <div class="modal-btns">
        <button class="btn-sm" id="sectionSelectNone">None</button>
        <button class="btn-sm" id="sectionSelectAll">All</button>
        <button class="btn" id="sectionOk"><i class="fa-solid fa-check"></i> Save</button>
      </div>
    </div>
  </div>

  
  <div id="toast" class="toast" style="display:none;">
    <i id="toastIcon" class="fa-solid fa-circle-info"></i>
    <span id="toastMsg"></span>
    <button id="toastClose" class="toast-close"><i class="fa-solid fa-xmark"></i></button>
  </div>

  <script src="./js/CSInterface.js"></script>
  <script src="./js/utils/storage.js"></script>
  <script src="./js/utils/fileSystem.js"></script>
  <script src="./js/utils/customSelect.js"></script>
  <script src="./js/utils/modelHandler.js"></script>
  <script src="./js/utils/queueManager.js"></script>
  <script src="./js/console.js"></script>
  <script src="./js/components/deadframesPanel.js"></script>
  <script src="./js/components/interpolationPanel.js"></script>
  <script src="./js/components/upscalePanel.js"></script>
  <script src="./js/components/consolePanel.js"></script>
  <script src="./js/components/queuePanel.js"></script>
  <script src="./js/components/toolsSetup.js"></script>
  <script src="./js/components/sysmonPanel.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
